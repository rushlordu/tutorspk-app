<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>INSIGHT Admin</title>
  <style>
    :root{color-scheme:dark;--bg:#080d16;--panel:#101827;--line:#22314a;--text:#eef5ff;--muted:#9fb0c7;--good:#58e68b;--bad:#ff6b6b;--warn:#ffd166;font-family:Inter,Segoe UI,Arial,sans-serif}*{box-sizing:border-box}body{margin:0;background:#080d16;color:var(--text)}button,input,select{font:inherit}button{border:1px solid #314768;background:#1b2b46;color:var(--text);border-radius:10px;padding:9px 11px;font-weight:800;cursor:pointer;margin:2px}.primary{background:#0e3a68}.danger{background:#51202a}.good{background:#16452e}.muted{color:var(--muted)}.small{font-size:12px}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.box{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px}input,select{width:100%;background:#0b1220;color:var(--text);border:1px solid #314768;border-radius:10px;padding:11px;margin:8px 0}.app{display:none}.top{position:sticky;top:0;background:#0c1422;border-bottom:1px solid var(--line);z-index:10;padding:12px}.wrap{max-width:1100px;margin:auto;padding:12px 12px 60px}.grid{display:grid;grid-template-columns:1fr;gap:12px}.card{border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:12px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.pill{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid #314768;background:#0b1220;font-size:12px}.pending{color:var(--warn)}.active{color:var(--good)}.rejected,.disabled{color:var(--bad)}.cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.mono{font-family:Consolas,monospace;overflow-wrap:anywhere}.chat{border-left:3px solid #355a8a}.hidden{display:none}@media(max-width:620px){.top h2{font-size:17px}.wrap{padding:10px}.row button{flex:1 1 120px}.card{padding:10px}}
  </style>
</head>
<body>
<section id="login" class="login"><div class="box"><h2>INSIGHT Admin</h2><p class="muted small">Enter admin code.</p><input id="code" type="password" placeholder="Admin code"><button class="primary" style="width:100%" onclick="adminLogin()">Login</button><p id="msg" class="small muted"></p></div></section>
<div id="app" class="app"><header class="top"><div class="row"><h2 style="margin:0;flex:1">INSIGHT Admin Dashboard</h2><button onclick="load()">Refresh</button><button onclick="logout()">Logout</button></div><div id="status" class="small muted">Loading...</div></header><main class="wrap"><section class="card"><h3>Admin Status</h3><p class="small muted">Keep this page open on your phone/laptop. It sends heartbeat, and users see Online/Away.</p><div class="row"><button class="good" onclick="setStatus('online')">Online</button><button onclick="setStatus('away')">Away</button><button class="danger" onclick="setStatus('offline')">Offline</button></div><div id="adminStatus" class="small muted"></div></section><div class="cols"><section class="card"><h3>Pending Requests</h3><div id="pending"></div></section><section class="card"><h3>Active / Other Users</h3><div id="users"></div></section></div><section class="card"><h3>Support Messages</h3><div id="chats"></div></section></main></div>
<script>
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
async function adminLogin(){msg.textContent='Checking...';let r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code.value})});let d=await r.json().catch(()=>({}));if(!r.ok){msg.textContent=d.detail||'Wrong code';return}showApp();load()}
function showApp(){login.style.display='none';app.style.display='block'}function showLogin(){login.style.display='flex';app.style.display='none'}
async function logout(){await fetch('/api/admin/logout',{method:'POST'}).catch(()=>{});showLogin()}
async function load(){let r=await fetch('/api/admin/data',{cache:'no-store'});if(r.status===401){showLogin();return}let d=await r.json();showApp();render(d)}
function render(d){status.textContent=`Users: ${d.users.length} · Chats: ${d.chats.length}`;adminStatus.innerHTML=`Manual: <b>${esc(d.admin_status.manual)}</b> · Effective: <b>${esc(d.admin_status.effective)}</b> · Auto online: ${d.admin_status.auto_online?'yes':'no'}`;let pendingUsers=d.users.filter(u=>u.status==='pending');pending.innerHTML=pendingUsers.length?pendingUsers.map(userCard).join(''):'<p class="muted small">No pending requests.</p>';users.innerHTML=d.users.filter(u=>u.status!=='pending').map(userCard).join('')||'<p class="muted small">No users yet.</p>';chats.innerHTML=d.chats.length?d.chats.map(c=>`<div class="card chat"><b>${esc(c.name||'-')}</b> <span class="muted small">${esc(c.email||'')}</span><div class="small muted">${new Date(c.created_at).toLocaleString()} · ${esc(c.sender)}</div><p>${esc(c.message)}</p></div>`).join(''):'<p class="muted small">No messages.</p>'}
function userCard(u){let exp=u.expires_at?new Date(u.expires_at).toLocaleString():'--';return `<div class="card"><div class="row"><b>${esc(u.name)}</b><span class="pill ${esc(u.status)}">${esc(u.status)}</span><span class="pill">${esc(u.plan_name)}</span></div><div class="small muted">${esc(u.email)}</div><div class="small">TX: <span class="mono">${esc(u.tx_hash||'-')}</span></div><div class="small">Network: ${esc(u.payment_network||'-')} · Expires: ${esc(exp)}</div><div class="small">Device locked: ${u.device_locked?'YES':'NO'} · Active sessions: ${u.active_sessions||0}</div><div class="small muted">Last IP: ${esc(u.last_ip||'-')}</div><div class="row" style="margin-top:8px">${u.status==='pending'?`<button class="good" onclick="act(${u.id},'approve')">Approve 30d</button><button class="danger" onclick="act(${u.id},'reject')">Reject</button>`:''}${u.status==='active'?`<button onclick="act(${u.id},'extend')">Extend 30d</button><button class="danger" onclick="act(${u.id},'disable')">Disable</button>`:''}<button onclick="act(${u.id},'reset_device')">Reset Device</button><button onclick="act(${u.id},'reset_session')">Reset Session</button></div></div>`}
async function act(id,action){let body={};if(action==='approve'||action==='extend')body.days=30;let r=await fetch(`/api/admin/user/${id}/${action}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok){let d=await r.json().catch(()=>({}));alert(d.detail||'Action failed')}load()}
async function setStatus(s){await fetch('/api/admin/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})});load()}
setInterval(()=>fetch('/api/admin/heartbeat',{method:'POST'}).catch(()=>{}),30000);load();
</script>
</body>
</html>
