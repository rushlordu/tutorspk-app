services:
  - type: web
    name: insight-engine-web
    runtime: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: uvicorn run_web:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: INSIGHT_AUTOSTART
        value: "1"
      - key: INSIGHT_AUTO_SYMBOLS
        value: "15"
      - key: INSIGHT_INTERVAL
        value: "1m"
      - key: INSIGHT_DEEP_LIMIT
        value: "15"
      - key: INSIGHT_MIN_SCORE
        value: "70"
