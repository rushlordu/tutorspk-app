{% extends 'base.html' %}
{% block content %}
<div class="form-card card narrow">
  <h1>Login</h1>
  <form method="post" class="form-grid">
    <input name="email" type="email" placeholder="Email" required>
    <div style="display:flex; gap:8px; align-items:center;">
      <input id="login_password" name="password" type="password" placeholder="Password" required style="flex:1;">
      <button type="button" class="btn btn-light btn-sm" onclick="togglePassword('login_password', this)">Show</button>
    </div>
    <button class="btn" type="submit">Login</button>
  </form>
  <div class="divider"></div>
    <a class="btn btn-light" href="{{ url_for('google_login') }}">
      <img src="https://developers.google.com/identity/images/g-logo.png"
          style="height:16px; vertical-align:middle; margin-right:6px;">
      Continue with Google
    </a>
</div>

<script>
function togglePassword(fieldId, btn) {
  const field = document.getElementById(fieldId);
  if (!field) return;
  if (field.type === "password") {
    field.type = "text";
    btn.textContent = "Hide";
  } else {
    field.type = "password";
    btn.textContent = "Show";
  }
}
</script>

{% endblock %}
