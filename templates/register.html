{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h1>Join TutorPK</h1>
  <p class="muted">Choose how you want to join, then complete a short profile.</p>

  <form method="post" enctype="multipart/form-data" id="registerForm">
    <div class="form-grid">
      <label for="role"><strong>I am joining as</strong></label>
      <select name="role" id="role" required onchange="toggleRoleSections()">
        <option value="">Select role</option>
        <option value="student">Student</option>
        <option value="tutor">Tutor</option>
      </select>
    </div>

    <div class="form-grid two-col" style="margin-top: 18px;">
      <input name="full_name" placeholder="Full name" required>
      <input name="public_name" placeholder="Display name" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>

      <div>
        <select name="gender" id="gender" onchange="toggleOtherField('gender', 'gender_other_wrap')">
          <option value="">Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="prefer_not_to_say">Prefer not to say</option>
          <option value="other">Other</option>
        </select>
        <div id="gender_other_wrap" style="display:none; margin-top:8px;">
          <input name="gender_other" placeholder="Enter gender">
        </div>
      </div>

      <div>
        <select name="city" id="city" onchange="toggleOtherField('city', 'city_other_wrap')">
          <option value="">City</option>
          <option value="islamabad">Islamabad</option>
          <option value="rawalpindi">Rawalpindi</option>
          <option value="lahore">Lahore</option>
          <option value="karachi">Karachi</option>
          <option value="peshawar">Peshawar</option>
          <option value="quetta">Quetta</option>
          <option value="online_only">Online Only</option>
          <option value="other">Other</option>
        </select>
        <div id="city_other_wrap" style="display:none; margin-top:8px;">
          <input name="city_other" placeholder="Enter city">
        </div>
      </div>

      <div>
        <label>Profile picture</label>
        <input name="profile_image_file" type="file" accept="image/*" capture="environment">
      </div>
    </div>

    <div id="studentFields" style="display:none; margin-top: 20px;">
      <h3>Student Details</h3>
      <div class="form-grid two-col">
        <div>
          <select name="student_level" id="student_level" onchange="toggleOtherField('student_level', 'student_level_other_wrap')">
            <option value="">Current class / level</option>
            <option value="grade_1_5">Grade 1–5</option>
            <option value="grade_6_8">Grade 6–8</option>
            <option value="matric">Matric</option>
            <option value="intermediate">Intermediate</option>
            <option value="o_level">O Level</option>
            <option value="a_level">A Level</option>
            <option value="university">University</option>
            <option value="other">Other</option>
          </select>
          <div id="student_level_other_wrap" style="display:none; margin-top:8px;">
            <input name="student_level_other" placeholder="Enter class / level">
          </div>
        </div>

        <div>
          <select name="student_subject_needed" id="student_subject_needed" onchange="toggleOtherField('student_subject_needed', 'student_subject_other_wrap')">
            <option value="">Subject needed</option>
            <option value="mathematics">Mathematics</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
            <option value="biology">Biology</option>
            <option value="english">English</option>
            <option value="urdu">Urdu</option>
            <option value="computer_science">Computer Science</option>
            <option value="pakistan_studies">Pakistan Studies</option>
            <option value="islamiat">Islamiat</option>
            <option value="other">Other</option>
          </select>
          <div id="student_subject_other_wrap" style="display:none; margin-top:8px;">
            <input name="student_subject_needed_other" placeholder="Enter subject">
          </div>
        </div>

        <div>
          <select name="preferred_tutor_gender">
            <option value="">Preferred tutor gender</option>
            <option value="no_preference">No preference</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>

        <div>
         <input type="hidden" name="learning_mode" value="online">
          <p class="muted">All sessions are conducted online.</p>
        </div>
      </div>
    </div>

    <div id="tutorFields" style="display:none; margin-top: 20px;">
      <h3>Tutor Details</h3>
      <div class="form-grid two-col">
        <div>
          <select name="qualification" id="qualification" onchange="toggleOtherField('qualification', 'qualification_other_wrap')">
            <option value="">Highest qualification</option>
            <option value="intermediate">Intermediate</option>
            <option value="bachelors">Bachelor's</option>
            <option value="masters">Master's</option>
            <option value="mphil">MPhil</option>
            <option value="phd">PhD</option>
            <option value="other">Other</option>
          </select>
          <div id="qualification_other_wrap" style="display:none; margin-top:8px;">
            <input name="qualification_other" placeholder="Enter qualification">
          </div>
        </div>

        <div>
          <select name="main_subject" id="main_subject" onchange="toggleOtherField('main_subject', 'main_subject_other_wrap')">
            <option value="">Main subject</option>
            <option value="mathematics">Mathematics</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
            <option value="biology">Biology</option>
            <option value="english">English</option>
            <option value="urdu">Urdu</option>
            <option value="computer_science">Computer Science</option>
            <option value="pakistan_studies">Pakistan Studies</option>
            <option value="islamiat">Islamiat</option>
            <option value="other">Other</option>
          </select>
          <div id="main_subject_other_wrap" style="display:none; margin-top:8px;">
            <input name="main_subject_other" placeholder="Enter main subject">
          </div>
        </div>

        <input name="additional_subjects" placeholder="Additional subjects (optional)">

        <div>
          <select name="class_levels" id="class_levels" onchange="toggleOtherField('class_levels', 'class_levels_other_wrap')">
            <option value="">Levels taught</option>
            <option value="grade_1_5">Grade 1–5</option>
            <option value="grade_6_8">Grade 6–8</option>
            <option value="matric">Matric</option>
            <option value="intermediate">Intermediate</option>
            <option value="o_level">O Level</option>
            <option value="a_level">A Level</option>
            <option value="university">University</option>
            <option value="other">Other</option>
          </select>
          <div id="class_levels_other_wrap" style="display:none; margin-top:8px;">
            <input name="class_levels_other" placeholder="Enter levels taught">
          </div>
        </div>

        <div>
          <select name="experience_years">
            <option value="">Experience</option>
            <option value="0">Fresh / Less than 1 year</option>
            <option value="1">1 year</option>
            <option value="2">2 years</option>
            <option value="3">3 years</option>
            <option value="5">4–5 years</option>
            <option value="7">6–7 years</option>
            <option value="10">8–10 years</option>
            <option value="15">10+ years</option>
          </select>
        </div>

        <input name="hourly_rate" type="number" min="0" step="1" placeholder="Rate per hour (PKR)">

        <div>
         <input type="hidden" name="teaching_mode" value="online">
         <p class="muted">TutorPK supports online teaching only.</p>
        </div>

        <label><input type="checkbox" name="modest_profile"> Modest / veiled profile preference</label>
        <label><input type="checkbox" name="audio_only"> Audio-first teaching preference</label>

        <textarea name="bio" placeholder="Short tutor profile / teaching style"></textarea>
        <input name="demo_video_url" placeholder="Demo video URL (optional)">
      </div>
    </div>

    <div style="margin-top: 22px;">
      <button class="btn" type="submit">Create account</button>
    </div>
  </form>

  <div class="divider"></div>
  <a class="btn btn-light" href="{{ url_for('google_login') }}">
    Sign up with Google
  </a>
</div>

<script>
function toggleRoleSections() {
  const role = document.getElementById("role").value;
  document.getElementById("studentFields").style.display = role === "student" ? "block" : "none";
  document.getElementById("tutorFields").style.display = role === "tutor" ? "block" : "none";
}

function toggleOtherField(selectId, wrapId) {
  const select = document.getElementById(selectId);
  const wrap = document.getElementById(wrapId);
  if (!select || !wrap) return;
  wrap.style.display = select.value === "other" ? "block" : "none";
}

document.addEventListener("DOMContentLoaded", function () {
  toggleRoleSections();
});
</script>
{% endblock %}
