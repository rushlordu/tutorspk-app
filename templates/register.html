{% extends 'base.html' %}
{% block content %}

<section class="auth-section">
<div class="auth-card" style="max-width:720px;">

  <h1>Create Your Account</h1>
  <p class="auth-sub">Start learning or teaching with ease</p>

  <form method="post" enctype="multipart/form-data" id="registerForm">

    <!-- ROLE SELECT -->
    <div class="role-toggle refined">
      <button type="button" id="studentBtn" onclick="setRole('student')">🎓 I’m a Student</button>
      <button type="button" id="tutorBtn" onclick="setRole('tutor')">📘 I’m a Tutor</button>
    </div>

    <input type="hidden" name="role" id="role" value="student">

    <!-- BASIC INFO -->
    <h3 class="section-title">Basic Information</h3>

    <div class="form-grid two-col">

      <input name="full_name" placeholder="Full Name" required>
      <input name="public_name" placeholder="Display Name (shown publicly)" required>

      <input name="email" type="email" placeholder="Email Address" required>

      <div class="password-wrap">
        <input id="register_password" name="password" type="password" placeholder="Create Password" required>
        <button type="button" onclick="togglePassword('register_password', this)">👁</button>
      </div>

      <!-- Gender -->
      <div>
        <select name="gender" id="gender" onchange="toggleOtherField('gender', 'gender_other_wrap')">
          <option value="">Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="prefer_not_to_say">Prefer not to say</option>
          <option value="other">Other</option>
        </select>
        <div id="gender_other_wrap" style="display:none;">
          <input name="gender_other" placeholder="Enter gender">
        </div>
      </div>

      <!-- City -->
      <div>
        <select name="city" id="city" onchange="toggleOtherField('city', 'city_other_wrap')">
          <option value="">Select City</option>
          <option value="islamabad">Islamabad</option>
          <option value="rawalpindi">Rawalpindi</option>
          <option value="lahore">Lahore</option>
          <option value="karachi">Karachi</option>
          <option value="peshawar">Peshawar</option>
          <option value="quetta">Quetta</option>
          <option value="online_only">Online Only</option>
          <option value="other">Other</option>
        </select>
        <div id="city_other_wrap" style="display:none;">
          <input name="city_other" placeholder="Enter city">
        </div>
      </div>

      <div>
        <label class="small-label">Profile Picture (optional)</label>
        <input name="profile_image_file" type="file" accept="image/*">
      </div>

    </div>

    <!-- ================= STUDENT ================= -->
    <div id="studentFields" style="display:none; margin-top:25px;">
      <h3 class="section-title">Student Details</h3>

      <div class="form-grid two-col">

        <select name="student_level">
          <option value="">Select Level</option>
          <option value="grade_1_5">Grade 1–5</option>
          <option value="grade_6_8">Grade 6–8</option>
          <option value="matric">Matric</option>
          <option value="intermediate">Intermediate</option>
          <option value="o_level">O Level</option>
          <option value="a_level">A Level</option>
          <option value="other">Other</option>
        </select>

        <select name="student_subject_needed">
          <option value="">Select Subject</option>
          <option value="mathematics">Mathematics</option>
          <option value="english">English</option>
          <option value="science">Science</option>
          <option value="other">Other</option>
        </select>

        <select name="preferred_tutor_gender">
          <option value="">Tutor Preference</option>
          <option value="no_preference">No preference</option>
          <option value="female">Female</option>
          <option value="male">Male</option>
        </select>

        <p class="muted">📡 All sessions are conducted online for your convenience.</p>

      </div>
    </div>

    <!-- ================= TUTOR ================= -->
    <div id="tutorFields" style="display:none; margin-top:25px;">
      <h3 class="section-title">Tutor Details</h3>

      <div class="form-grid two-col">

        <select name="qualification">
          <option value="">Select Qualification</option>
          <option value="bachelors">Bachelor's</option>
          <option value="masters">Master's</option>
          <option value="mphil">MPhil</option>
          <option value="phd">PhD</option>
        </select>

        <input name="main_subject" placeholder="Main Subject">

        <input name="additional_subjects" placeholder="Additional Subjects">

        <input name="class_levels" placeholder="Levels You Teach">

        <select name="experience_years">
          <option value="">Teaching Experience</option>
          <option value="1">1 year</option>
          <option value="3">3 years</option>
          <option value="5">5 years</option>
          <option value="10">10+ years</option>
        </select>

        <input name="hourly_rate" type="number" placeholder="Hourly Rate (PKR)">

        <label><input type="checkbox" name="modest_profile"> Modest / Veiled Profile</label>
        <label><input type="checkbox" name="audio_only"> Audio-first Teaching</label>

        <textarea name="bio" placeholder="Write a short teaching profile"></textarea>

        <input name="demo_video_url" placeholder="Demo Video URL (optional)">

      </div>
    </div>

    <button class="auth-btn-primary" type="submit" style="margin-top:25px;">
      Create Account
    </button>

  </form>

  <div class="divider">OR</div>

  <a href="{{ url_for('google_login') }}" class="auth-btn-google">
    <img src="https://developers.google.com/identity/images/g-logo.png">
    Continue with Google
  </a>

</div>
</section>

<script>
function setRole(role) {
  document.getElementById("role").value = role;

  document.getElementById("studentBtn").classList.remove("active");
  document.getElementById("tutorBtn").classList.remove("active");

  if (role === "student") {
    document.getElementById("studentBtn").classList.add("active");
    document.getElementById("studentFields").style.display = "block";
    document.getElementById("tutorFields").style.display = "none";
  } else {
    document.getElementById("tutorBtn").classList.add("active");
    document.getElementById("tutorFields").style.display = "block";
    document.getElementById("studentFields").style.display = "none";
  }
}

function togglePassword(fieldId, btn) {
  const field = document.getElementById(fieldId);
  field.type = field.type === "password" ? "text" : "password";
}

function toggleOtherField(selectId, wrapId) {
  const select = document.getElementById(selectId);
  const wrap = document.getElementById(wrapId);
  if (wrap) wrap.style.display = select.value === "other" ? "block" : "none";
}

document.addEventListener("DOMContentLoaded", function () {
  setRole('student');
});
</script>

{% endblock %}
