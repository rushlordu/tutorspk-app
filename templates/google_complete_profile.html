{% extends 'base.html' %}
{% block content %}

<div class="card">
  <h1>Complete your signup</h1>
  <p class="muted">Continue your registration using Google account.</p>

  <form method="post" enctype="multipart/form-data" id="registerForm">

    <div class="form-grid two-col">
      <input name="full_name" value="{{ google_name }}" required>
      <input name="public_name" value="{{ google_name }}" required>

      <input name="email" value="{{ google_email }}" readonly>
      <input type="hidden" name="role" id="roleHidden">

      <div>
        <select name="gender">
          <option value="">Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="prefer_not_to_say">Prefer not to say</option>
        </select>
      </div>

      <input name="city" placeholder="City">

      <div>
        <label>Profile picture</label>
        <input name="profile_image_file" type="file" accept="image/*">
      </div>
    </div>

    <div style="margin-top:20px;">
      <strong>Select your role</strong><br><br>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" id="studentRoleBtn" class="btn btn-light" onclick="setRole('student')">Join as Student</button>
        <button type="button" id="tutorRoleBtn" class="btn btn-light" onclick="setRole('tutor')">Join as Tutor</button>
      </div>
    </div>

    <div id="studentFields" style="display:none; margin-top:20px;">
      <h3>Student Details</h3>

      <div>
        <select name="student_subject_needed" id="google_student_subject_needed" onchange="toggleOtherField('google_student_subject_needed', 'google_student_subject_other_wrap')">
          <option value="">Subject needed</option>
          <option value="mathematics">Mathematics</option>
          <option value="physics">Physics</option>
          <option value="chemistry">Chemistry</option>
          <option value="biology">Biology</option>
          <option value="english">English</option>
          <option value="urdu">Urdu</option>
          <option value="computer_science">Computer Science</option>
          <option value="pakistan_studies">Pakistan Studies</option>
          <option value="islamiat">Islamiat</option>
          <option value="ielts">IELTS</option>
          <option value="spoken_english">Spoken English</option>
          <option value="arabic">Arabic</option>
          <option value="french">French</option>
          <option value="other">Other</option>
        </select>
        <div id="google_student_subject_other_wrap" style="display:none; margin-top:8px;">
          <input name="student_subject_needed_other" placeholder="Enter subject">
        </div>
      </div>

      <div>
        <select name="student_level" id="google_student_level" onchange="toggleOtherField('google_student_level', 'google_student_level_other_wrap')">
          <option value="">Level</option>
          <option value="grade_1_5">Grade 1–5</option>
          <option value="grade_6_8">Grade 6–8</option>
          <option value="matric">Matric</option>
          <option value="intermediate">Intermediate</option>
          <option value="o_level">O Level</option>
          <option value="a_level">A Level</option>
          <option value="university">University</option>
          <option value="language_learning">Language Learning</option>
          <option value="other">Other</option>
        </select>
        <div id="google_student_level_other_wrap" style="display:none; margin-top:8px;">
          <input name="student_level_other" placeholder="Enter class / level">
        </div>
      </div>

      <select name="preferred_tutor_gender">
        <option value="">Tutor gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>

      <input type="hidden" name="learning_mode" value="online">
    </div>

    <div id="tutorFields" style="display:none; margin-top:20px;">
      <h3>Tutor Details</h3>

      <div>
        <select name="qualification" id="google_qualification" onchange="toggleOtherField('google_qualification', 'google_qualification_other_wrap')">
          <option value="">Highest qualification</option>
          <option value="intermediate">Intermediate</option>
          <option value="bachelors">Bachelor's</option>
          <option value="masters">Master's</option>
          <option value="mphil">MPhil</option>
          <option value="phd">PhD</option>
          <option value="other">Other</option>
        </select>
        <div id="google_qualification_other_wrap" style="display:none; margin-top:8px;">
          <input name="qualification_other" placeholder="Enter qualification">
        </div>
      </div>

      <div>
        <select name="main_subject" id="google_main_subject" onchange="toggleOtherField('google_main_subject', 'google_main_subject_other_wrap')">
          <option value="">Main subject</option>
          <option value="mathematics">Mathematics</option>
          <option value="physics">Physics</option>
          <option value="chemistry">Chemistry</option>
          <option value="biology">Biology</option>
          <option value="english">English</option>
          <option value="urdu">Urdu</option>
          <option value="computer_science">Computer Science</option>
          <option value="pakistan_studies">Pakistan Studies</option>
          <option value="islamiat">Islamiat</option>
          <option value="ielts">IELTS</option>
          <option value="spoken_english">Spoken English</option>
          <option value="arabic">Arabic</option>
          <option value="french">French</option>
          <option value="other">Other</option>
        </select>
        <div id="google_main_subject_other_wrap" style="display:none; margin-top:8px;">
          <input name="main_subject_other" placeholder="Enter main subject">
        </div>
      </div>

      <input name="additional_subjects" placeholder="Additional subjects">

      <div>
        <select name="class_levels" id="google_class_levels" onchange="toggleOtherField('google_class_levels', 'google_class_levels_other_wrap')">
          <option value="">Levels taught</option>
          <option value="grade_1_5">Grade 1–5</option>
          <option value="grade_6_8">Grade 6–8</option>
          <option value="matric">Matric</option>
          <option value="intermediate">Intermediate</option>
          <option value="o_level">O Level</option>
          <option value="a_level">A Level</option>
          <option value="university">University</option>
          <option value="language_learning">Language Learning</option>
          <option value="other">Other</option>
        </select>
        <div id="google_class_levels_other_wrap" style="display:none; margin-top:8px;">
          <input name="class_levels_other" placeholder="Enter levels taught">
        </div>
      </div>

      <input name="experience_years" type="number" placeholder="Experience years">
      <input name="hourly_rate" type="number" placeholder="Hourly rate">

      <textarea name="bio" placeholder="Your teaching style"></textarea>
      <input name="demo_video_url" placeholder="Demo video URL">

      <label><input type="checkbox" name="modest_profile"> Modest profile</label>
      <label><input type="checkbox" name="audio_only"> Audio only</label>

      <input type="hidden" name="teaching_mode" value="online">
    </div>

    <div style="margin-top:20px;">
      <button class="btn" type="submit">Complete signup</button>
    </div>

  </form>
</div>

<script>
function setRole(role) {
  document.getElementById("roleHidden").value = role;

  const studentFields = document.getElementById("studentFields");
  const tutorFields = document.getElementById("tutorFields");
  const studentBtn = document.getElementById("studentRoleBtn");
  const tutorBtn = document.getElementById("tutorRoleBtn");

  if (role === "student") {
    studentFields.style.display = "block";
    tutorFields.style.display = "none";
    studentBtn.className = "btn";
    tutorBtn.className = "btn btn-light";
  } else {
    studentFields.style.display = "none";
    tutorFields.style.display = "block";
    studentBtn.className = "btn btn-light";
    tutorBtn.className = "btn";
  }
}

function toggleOtherField(selectId, wrapId) {
  const select = document.getElementById(selectId);
  const wrap = document.getElementById(wrapId);
  if (!select || !wrap) return;
  wrap.style.display = select.value === "other" ? "block" : "none";
}

document.addEventListener("DOMContentLoaded", function () {
  setRole("student");

  toggleOtherField("google_student_level", "google_student_level_other_wrap");
  toggleOtherField("google_student_subject_needed", "google_student_subject_other_wrap");
  toggleOtherField("google_qualification", "google_qualification_other_wrap");
  toggleOtherField("google_main_subject", "google_main_subject_other_wrap");
  toggleOtherField("google_class_levels", "google_class_levels_other_wrap");
});
</script>

{% endblock %}
