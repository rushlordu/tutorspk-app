{% extends 'base.html' %}
{% block content %}
<section class="error-page card">
  <div class="error-code">403</div>
  <h1>Access denied</h1>
  <p class="muted">You do not have permission to open this page.</p>
  <div class="error-actions">
    <a class="btn btn-primary" href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('login') }}">
      {{ 'Back to dashboard' if current_user.is_authenticated else 'Log in' }}
    </a>
  </div>
</section>
{% endblock %}
