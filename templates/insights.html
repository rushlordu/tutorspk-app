<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INSIGHT Engine</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0b1220;
      overflow: hidden;
    }

    .topbar {
      height: 52px;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-family: Arial, sans-serif;
      border-bottom: 1px solid #1e293b;
      box-sizing: border-box;
    }

    .topbar strong {
      font-size: 16px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: #1e293b;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 52px);
      border: 0;
      display: block;
    }

    @media (max-width: 600px) {
      .topbar {
        height: 48px;
        padding: 0 10px;
      }

      .topbar strong {
        font-size: 14px;
      }

      .topbar a {
        font-size: 12px;
        padding: 7px 9px;
      }

      iframe {
        height: calc(100vh - 48px);
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <strong>INSIGHT Engine</strong>
    <a href="https://insight-engine-web-asia.onrender.com" target="_blank" rel="noopener">
      Open Full Screen
    </a>
  </div>

  <iframe
    src="https://insight-engine-web-asia.onrender.com"
    title="INSIGHT Engine Live Dashboard"
    allowfullscreen>
  </iframe>
</body>
</html>
