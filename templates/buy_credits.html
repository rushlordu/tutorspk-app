{% extends 'base.html' %}
{% block content %}
<section class="grid two">
  <div class="card">
    <h1>Buy Credits</h1>
    <p><strong>Rate:</strong> 1 credit = Rs {{ credit_rate }}</p>
    <p><strong>Bank title:</strong> {{ bank_title }}</p>
    <p><strong>Bank name:</strong> {{ bank_name }}</p>
    <p><strong>IBAN:</strong> {{ bank_iban }}</p>
    <p><strong>WhatsApp proof:</strong> Send transfer screenshot to admin via {{ support_whatsapp }}</p>
  </div>
  <div class="card">
    <h2>Submit payment notice</h2>
    <form method="post" enctype="multipart/form-data" class="form-grid">
      <input name="amount_sent_pkr" type="number" min="10" placeholder="Amount sent (PKR)" required>
      <input name="sender_name" placeholder="Sender name">
      <input name="sender_account" placeholder="Sender account / wallet no">
      <select name="transfer_method"><option value="bank">Bank</option><option value="easypaisa">EasyPaisa</option></select>
      <input name="screenshot" type="file" accept="image/*,.pdf">
      <textarea name="note" placeholder="Optional note"></textarea>
      <button class="btn" type="submit">Submit notice</button>
    </form>
  </div>
</section>
{% endblock %}
